<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zadat trénink</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 10px;
            background-color: #f9f9f9;
        }

        form {
            background-color: #fff;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 400px;
            margin: auto;
        }

        label {
            font-weight: bold;
            margin-bottom: 4px;
        }

        input, select, button {
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 16px;
            width: 100%;
            box-sizing: border-box;
        }

        button {
            background-color: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
            margin-top: 5px;
        }

        button:hover {
            background-color: #0056b3;
        }

        .back-link {
            display: inline-block;
            margin-top: 15px;
            padding: 5px 10px;
            background-color: #ccc;
            border-radius: 4px;
            text-decoration: none;
        }
    </style>
</head>
<body>

<h1>Zadat trénink</h1>

{% if current_user.is_authenticated %}
<p>Jsi přihlášen(a) jako {{ current_user.email }}. <a href="{{ url_for('logout') }}">Odhlásit se</a></p>
{% else %}
<p><a href="{{ url_for('login') }}">Přihlásit se</a> | <a href="{{ url_for('register') }}">Registrovat</a></p>
{% endif %}

{% if message %}
<p style="color:green;">{{ message }}</p>
{% endif %}

<form method="POST">
    <label for="date">Datum:</label>
    <input type="date" id="date" name="date" required value="{{ today }}" onchange="updatePage()">

    <label for="exercise">Cvik:</label>
    <select id="exercise" name="exercise" required onchange="updatePage(); toggleFields();">
        {% for cvik in silove_cviky %}
        <option value="{{ cvik }}" {% if cvik == exercise %}selected{% endif %}>{{ cvik }}</option>
        {% endfor %}
    </select>

    <!-- Silový trénink -->
    <div id="strength_fields">
        <label for="weight">Váha (kg):</label>
        <input 
            type="text" 
            id="weight" 
            name="weight" 
            value="{{ last_weight }}"
            inputmode="decimal"
            placeholder="kg"
        >

        <label for="reps">Opakování:</label>
        <input 
            type="text" 
            id="reps" 
            name="reps" 
            inputmode="numeric"
            placeholder="opakování"
        >

        <label for="set">Série:</label>
        <input type="number" id="set" name="set" value="{{ next_set or 1 }}" readonly>
    </div>

    <!-- Kardio trénink -->
    <div id="cardio_fields">
        <label for="minutes">Čas (min):</label>
        <input type="number" id="minutes" name="minutes" min="1">

        <label for="speed">Rychlost (km/h):</label>
        <input type="number" step="0.1" id="speed" name="speed" min="0">

        <label for="incline">Stoupání (%):</label>
        <input type="number" step="0.1" id="incline" name="incline" min="0">
    </div>

    <button type="submit">Uložit</button>
</form>

<p>
<a href="/" class="back-link">Zpět</a>
</p>

<script>
function toggleFields() {
    let exercise = document.getElementById("exercise").value;
    let strength = document.getElementById("strength_fields");
    let cardio = document.getElementById("cardio_fields");
    if (exercise === "Běh na pásu") {
        strength.style.display = "none";
        cardio.style.display = "block";
    } else {
        strength.style.display = "block";
        cardio.style.display = "none";
    }
}

function updatePage() {
    let date = document.getElementById("date").value;
    let exercise = document.getElementById("exercise").value;
    window.location.href = `/zadat?date=${date}&exercise=${exercise}`;
}

// Autofocus na reps při načtení (jen u silového tréninku)
window.onload = function () {
    toggleFields();
    let exercise = document.getElementById("exercise").value;
    if (exercise !== "Běh na pásu") {
        let repsInput = document.getElementById("reps");
        if (repsInput) {
            repsInput.focus();
        }
    }
};
</script>
</body>
</html>
