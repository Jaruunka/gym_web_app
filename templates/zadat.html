<body onload="toggleFields()">

<h1>Zadat trénink</h1>

{% if current_user.is_authenticated %}
<p>Jsi přihlášen(a) jako {{ current_user.email }}. <a href="{{ url_for('logout') }}">Odhlásit se</a></p>
{% else %}
<p><a href="{{ url_for('login') }}">Přihlásit se</a> | <a href="{{ url_for('register') }}">Registrovat</a></p>
{% endif %}

{% if message %}
<p style="color:green;">{{ message }}</p>
{% endif %}

<form method="POST">
    <label for="date">Datum:</label>
    <input type="date" id="date" name="date" required value="{{ today }}" onchange="updatePage()">

    <label for="exercise">Cvik:</label>
    <select id="exercise" name="exercise" required onchange="updatePage(); toggleFields();">
        <option value="Dřepy" {% if exercise == 'Dřepy' %}selected{% endif %}>Dřepy</option>
        <option value="Hipthrusty" {% if exercise == 'Hipthrusty' %}selected{% endif %}>Hipthrusty</option>
        <option value="Bulhary" {% if exercise == 'Bulhary' %}selected{% endif %}>Bulhary</option>
        <option value="Tricepsový tlak" {% if exercise == 'Tricepsový tlak' %}selected{% endif %}>Tricepsový tlak</option>
        <option value="Abduction" {% if exercise == 'Abduction' %}selected{% endif %}>Abduction</option>
        <option value="Běh na pásu" {% if exercise == 'Běh na pásu' %}selected{% endif %}>Běh na pásu</option>
    </select>

    <!-- Silový trénink -->
    <div id="strength_fields">
        <label for="weight">Váha (kg):</label>
        <input type="number" id="weight" name="weight" min="0">

        <label for="reps">Opakování:</label>
        <input type="number" id="reps" name="reps" min="1">

        <label for="set">Série:</label>
        <input type="number" id="set" name="set" value="{{ next_set or 1 }}" readonly>
    </div>

    <!-- Kardio trénink -->
    <div id="cardio_fields">
        <label for="minutes">Čas (min):</label>
        <input type="number" id="minutes" name="minutes" min="1">

        <label for="speed">Rychlost (km/h):</label>
        <input type="number" step="0.1" id="speed" name="speed" min="0">

        <label for="incline">Stoupání (%):</label>
        <input type="number" step="0.1" id="incline" name="incline" min="0">
    </div>

    <br>
    <button type="submit">Uložit</button>
</form>

<p>
<a href="/" style="text-decoration:none; padding:5px 10px; background-color:#ccc; border-radius:4px;">
Zpět
</a>
</p>

<script>
function toggleFields() {
    let exercise = document.getElementById("exercise").value;
    let strength = document.getElementById("strength_fields");
    let cardio = document.getElementById("cardio_fields");
    if (exercise === "Běh na pásu") {
        strength.style.display = "none";
        cardio.style.display = "block";
    } else {
        strength.style.display = "block";
        cardio.style.display = "none";
    }
}

// reload stránky při změně cviku nebo data
function updatePage() {
    let date = document.getElementById("date").value;
    let exercise = document.getElementById("exercise").value;
    window.location.href = `/zadat?date=${date}&exercise=${exercise}`;
}
</script>

</body>
